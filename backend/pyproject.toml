[project]
name = "supform-backend"
version = "0.1.0"
description = "Supform API — FastAPI + SQLAlchemy form & survey platform"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "pydantic[email]>=2.6",            # [email] -> email-validator, needed for EmailStr
    "pydantic-settings>=2.2",
    "sqlalchemy>=2.0",
    "asyncpg>=0.29",
    "alembic>=1.13",
    "passlib>=1.7",                     # password hashing (pbkdf2_sha256, pure-Python)
    "python-multipart>=0.0.9",          # file uploads
    "celery[redis]>=5.3",
    "redis>=5.0",
    "httpx>=0.27",
    "openpyxl>=3.1",                    # xlsx import/export
    "pyxform>=2.0",                     # XLSForm -> XForm helpers (importer)
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
    "mypy>=1.9",
    "aiosqlite>=0.20",                  # in-memory async DB for tests
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.ruff]
line-length = 100
target-version = "py311"
# Alembic migrations are autogenerated; don't lint their style.
extend-exclude = ["alembic"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "ASYNC"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's dependency-injection idiom relies on calls in argument defaults.
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Body",
    "fastapi.Header",
    "fastapi.Security",
    "fastapi.Form",
    "fastapi.File",
]

[tool.mypy]
python_version = "3.11"
plugins = ["pydantic.mypy"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
