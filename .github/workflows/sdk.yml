name: sdk

on:
  push:
    paths: ["sdk/**", ".github/workflows/sdk.yml"]
  pull_request:
    paths: ["sdk/**", ".github/workflows/sdk.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q
