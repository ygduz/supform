# Local development stack for Supform.
# Production deployment lives under infra/.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: supform
      POSTGRES_PASSWORD: supform
      POSTGRES_DB: supform
    ports:
      - "5432:5432"
    volumes:
      - supform_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      SUPFORM_DATABASE_URL: postgresql+asyncpg://supform:supform@db:5432/supform
      SUPFORM_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker -l info
    env_file: .env
    environment:
      SUPFORM_DATABASE_URL: postgresql+asyncpg://supform:supform@db:5432/supform
      SUPFORM_REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  frontend:
    build: ./frontend
    command: npm run dev -- --host
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  supform_pgdata:
